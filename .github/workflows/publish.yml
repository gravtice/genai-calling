name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Check tag matches version
        run: |
          python_bin="$(uv python find 3.10)"
          "$python_bin" - <<'PY'
          import os
          import re
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          text = Path("pyproject.toml").read_text(encoding="utf-8")
          m = re.search(r'^version\s*=\s*"([^"]+)"\s*$', text, re.MULTILINE)
          if m is None:
            raise SystemExit("failed to read project.version from pyproject.toml")
          version = m.group(1)
          expected = f"v{version}"
          if tag != expected:
            raise SystemExit(f"tag {tag!r} != {expected!r}")
          PY

      - name: Install dependencies
        run: uv sync

      - name: Run quality gates
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy nous/ --no-error-summary
          uv run pytest tests/ -q

      - name: Build
        run: uv build --sdist --wheel

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
